async function parseTransaction(input, apiKey) {
  const sys = `Parse natural language financial transactions for a UK user. Return ONLY valid JSON, no markdown.
Categories: Food & Dining, Groceries, Transport, Shopping, Bills & Utilities, Entertainment, Health & Fitness, Subscriptions, Travel, Housing, Income, Savings, Transfer, Other

JSON: merchant(str) amount(number positive) currency(str default GBP) type(income|expense) category(str) description(str) notes(str) paymentMethod(str default Card)`;
  try {
    const r = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 500,
        system: sys,
        messages: [{
          role: "user",
          content: input

    });
    const data = await r.json();
    if (data.error) throw new Error(data.error.message);
    const raw = (data.content?.[0]?.text || "").replace(/```json\n?|\n?```/g, "").trim();
    return JSON.parse(raw);
  } catch (e) {
    console.error(e);
    return null;
  }
}
